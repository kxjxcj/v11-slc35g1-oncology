name: slc35g1
channels:
  - conda-forge
  - bioconda
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.11
  - pip
  - jupyter
  - jupyterlab
  - notebook
  - nbconvert
  - ipykernel
  - pandoc

  # Core scientific stack
  - numpy=1.26
  - pandas=2.1
  - scipy=1.11
  - scikit-learn=1.4
  - matplotlib=3.8
  - seaborn=0.13
  - statsmodels=0.14
  - lifelines=0.27
  - h5py=3.10
  - pytables=3.9
  - tqdm=4.66
  - requests=2.31
  - beautifulsoup4=4.12
  - lxml=4.9

  # Single-cell + perturbation
  - scanpy=1.9
  - anndata=0.10
  - scvi-tools=1.0
  - scgen=2.1
  - muon=0.1.5

  # PPI / networks
  - networkx=3.2
  - python-igraph=0.11

  # AlphaFold / structural
  - rdkit=2024.03

  # Causal inference
  - pip:
    - dowhy==0.10
    - econml==0.16
    - causal-learn==0.1.3.8

  # Plot helpers
  - plotly=5.18
  - kaleido=0.2.1

  # Performance / parallel
  - joblib=1.3
  - dask=2024.1
  - numba=0.59

  # Test / lint
  - pytest=8.0
  - pytest-cov=4.1
  - mypy=1.8
  - ruff=0.2

  # MD pipeline (GROMACS installed in base layer via apt-get for size)
  - pip:
    - mdtraj==1.9.9
    - prolif==2.0.3
    - openmm==8.1.1
    - parmed==4.2.2

  # Bioinformatics glue
  - pip:
    - pybiomart==0.2.0
    - gseapy==1.1.3
    - pydeseq2==0.4.4
    - scrublet==0.2.3
    - doubletdetection==4.3
    - bbknn==1.6.0
    - magic-impute==3.0.0
    - scvelo==0.2.5
    - cellrank==2.0.4
    - pertpy==0.8.0

  # Geospatial (for pan-cancer spatial transcriptomics)
  - geopandas=0.14
  - shapely=2.0
  - pyproj=3.6